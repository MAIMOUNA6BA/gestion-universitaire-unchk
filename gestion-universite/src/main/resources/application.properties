spring.application.name=gestion-universite

# Configuration de la base de donnķes MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/universite_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuration de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dķsactivation complĶte de la sķcuritķ Spring Security pour le dķveloppement
spring.security.user.name=admin
spring.security.user.password=admin
management.security.enabled=false